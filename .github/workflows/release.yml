name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build
        run: swift build
      
      - name: Test
        run: swift test
      
      - name: Archive
        run: |
          mkdir -p build
          swift build -c release
      
      - name: Create Release Asset
        run: |
          mkdir -p build/export
          cp -r .build/release/days-left.app build/export/ 2>/dev/null || cp .build/release/days-left build/export/
          cd build/export && zip -r ../DaysLeft-${{ github.ref_name }}.zip .
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/DaysLeft-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
