name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build
        run: xcodebuild -scheme "Days Left" -configuration Release -destination 'platform=macOS' build
      
      - name: Test
        run: xcodebuild -scheme "Days Left" -destination 'platform=macOS' test
      
      - name: Archive
        run: |
          xcodebuild -scheme "Days Left" \
            -configuration Release \
            -archivePath build/DaysLeft.xcarchive \
            archive
      
      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath build/DaysLeft.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist resources/export-options.plist
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Days Left" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "build/DaysLeft-${{ github.ref_name }}.dmg" \
            "build/export/Days Left.app"
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/DaysLeft-${{ github.ref_name }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
