name: Bug Report
description: Create a report to help us improve
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is
      placeholder: When I click the menu bar icon...
    validations:
      required: true
  
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
      placeholder: The menu should show...
    validations:
      required: true
  
  - type: input
    id: macos_version
    attributes:
      label: macOS Version
      placeholder: 'e.g. 14.0'
    validations:
      required: true
  
  - type: input
    id: app_version
    attributes:
      label: Days Left Version
      placeholder: 'e.g. 1.0.0'
    validations:
      required: true
  
  - type: input
    id: mac_model
    attributes:
      label: Mac Model
      placeholder: 'e.g. MacBook Pro M3'
    validations:
      required: false
  
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem
      placeholder: Drag and drop images here
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here
      placeholder: Any other details...
    validations:
      required: false
